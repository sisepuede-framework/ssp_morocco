citations:
  - "SNBC Ch.7.7 p.80, Table 18 -- Forest sequestration target 54 Mt/yr by 2050"
description: >-
  SNBC Net Zero: Increase forest carbon sequestration toward 54 Mt CO2eq/yr
  by 2050 through improved forest management. Magnitude of 0.10 represents
  a 10% annual improvement in per-hectare sequestration rates. Works
  alongside LNDU:INC_REFORESTATION which expands forest area. Mild sigmoid
  for biological growth dynamics.
identifiers:
  transformation_code: "TX:FRST:INCREASE_SEQUESTRATION_STRATEGY_NDC"
  transformation_name: "SNBC NDC - FRST: Enhanced forest sequestration"
parameters:
  cats_frst: null
  magnitude: 0.10
  return_cats_forest: false
  vec_implementation_ramp:
    tp_0_ramp: 7
    n_tp_ramp: 28
    alpha_logistic: 0.2
    window_logistic: [-8, 8]
transformer: "TFR:FRST:INCREASE_SEQUESTRATION"
