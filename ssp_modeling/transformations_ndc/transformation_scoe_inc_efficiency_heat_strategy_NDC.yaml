  - 'SNBC Table 13 p.149: Solar water heaters for 80% of households'
  - 'SNBC Table 14 p.155: Tertiary building heat system upgrades'
description: >-
  SNBC Net Zero: 30% heat delivery efficiency improvement through solar water
  heaters (80% of homes), heat pumps (COP>3), and boiler efficiency. Magnitude
  of 0.3 (dict_cats_to_magnitude parameter) represents a 30% improvement in
  heat delivery efficiency. Mild sigmoid ramp from tp 10 (2025) over 25 periods
  with alpha 0.3 reflects technology adoption dynamics for heat systems.
identifiers:
  transformation_code: "TX:SCOE:INC_EFFICIENCY_HEAT_STRATEGY_NDC"
  transformation_name: "SNBC Net Zero - SCOE: 30% heat delivery efficiency improvement"
parameters:
  dict_cats_to_magnitude: 0.3
  return_dict_cats_to_magnitude: false
  vec_implementation_ramp:
    tp_0_ramp: 10
    n_tp_ramp: 25
    alpha_logistic: 0.3
    window_logistic: [-8, 8]
transformer: "TFR:SCOE:INC_EFFICIENCY_HEAT"
